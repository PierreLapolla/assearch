services:
  api:
    build: ./backend
    container_name: assearch
    env_file:
      - ./backend/.env
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200

      # Recommended so metrics/traces are explicitly exported
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none

    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: ["--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    container_name: assearch-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  elasticsearch-data: